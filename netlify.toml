[build]
  publish = "dist"
  command = "npm run build"

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Allow sitemap files directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/sitemap-pages.xml"
  to = "/sitemap-pages.xml"
  status = 200

[[redirects]]
  from = "/sitemap-tools.xml"
  to = "/sitemap-tools.xml"
  status = 200

[[redirects]]
  from = "/sitemap-categories.xml"
  to = "/sitemap-categories.xml"
  status = 200

# Allow robots.txt directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA fallback — only for routes without a prerendered index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false